name: CI - Controller

on:
  push:
    branches: [main, dev]
    paths:
      - 'controller/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'controller/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controller
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'controller/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Biome check (lint + format)
        run: npm run check
      
      - name: TypeScript type check
        run: npm run typecheck
      
      - name: Run tests
        run: npm run test:run
      
      - name: Build
        run: npm run build
