# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ja"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: false
    drafts: false
  path_instructions:
    - path: "controller/**"
      instructions: |
        このディレクトリはNext.jsアプリケーションです。
        - App Routerを使用しています
        - TypeScript strict modeで動作しています
        - センサーAPI（DeviceMotionEvent/DeviceOrientationEvent）を使用します
        - Socket.IOでリアルタイム通信を行います
    - path: "Assets/**"
      instructions: |
        このディレクトリはUnityプロジェクトです。
        - Unity 6 (6000.3.17f1) を使用しています
        - URP (Universal Render Pipeline) が適用されています
        - C#の命名規則に従ってください（PascalCase, camelCase）
        - public変数の代わりにプロパティを使用してください
chat:
  auto_reply: true
